<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>חבילה עוברת - בר אילן</title>
    <style>
        :root { --bg-green: #003e29; --biu-blue: #72d3f0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-green); font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; direction: rtl; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; align-items: center; position: relative; }
        .img-header { width: 100%; height: auto; flex-shrink: 0; }
        .img-logo { width: 45%; max-width: 160px; height: auto; margin-top: 10px; flex-shrink: 0; }
        .player-display { color: white; font-size: clamp(20px, 6vw, 28px); font-weight: bold; margin: 10px 0; text-align: center; }
        .gift-area { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; min-height: 0; }
        .img-gift { max-width: 60%; max-height: 70%; object-fit: contain; cursor: pointer; }
        .footer-area { width: 100%; text-align: center; padding-bottom: env(safe-area-inset-bottom, 15px); flex-shrink: 0; }
        .img-btn { width: 75%; max-width: 300px; height: auto; cursor: pointer; }

        #setup-screen { position: absolute; inset: 0; background: var(--bg-green); z-index: 1000; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 0 20px 30px 20px; box-sizing: border-box; }
        .guide-box { width: 100%; background: rgba(255, 255, 255, 0.08); border: 2px solid var(--biu-blue); border-radius: 15px; padding: 15px; color: white; font-size: 13px; margin-top: 20px; line-height: 1.5; box-sizing: border-box; }
        .guide-box h2 { color: var(--biu-blue); margin: 0 0 10px 0; font-size: 18px; text-align: center; border-bottom: 1px solid rgba(114, 211, 240, 0.3); padding-bottom: 5px; }
        
        label { color: var(--biu-blue); font-weight: bold; align-self: flex-start; margin-top: 15px; margin-bottom: 5px; }
        textarea { width: 100%; border-radius: 10px; border: 2px solid white; padding: 10px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
        #nameInput { height: 80px; }
        #taskInput { height: 120px; }

        #task-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 85%; padding: 25px; border-radius: 20px; text-align: center; display: none; z-index: 1500; box-shadow: 0 0 50px rgba(0,0,0,0.9); border: 5px solid var(--biu-blue); box-sizing: border-box; }
        .pulse { animation: pulseAnim 0.7s infinite alternate; }
        @keyframes pulseAnim { from { transform: scale(1); } to { transform: scale(1.08); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="setup-screen">
            <img src="header.png" class="img-header">
            <div class="guide-box">
                <h2>🛠️ לוח בקרה למרצה</h2>
                <p><strong>1. שתף מסך:</strong> סמן "Share Sound" ו-"Optimize for Video".</p>
                <p><strong>2. הכן משחק:</strong> הדבק שמות סטודנטים וערוך את המשימות למטה.</p>
                <p><strong>3. שחק:</strong> סובב חבילה, חכה לעצירה ולחץ על המתנה.</p>
            </div>

            <label>👥 רשימת סטודנטים:</label>
            <textarea id="nameInput" placeholder="הדבק שמות כאן..."></textarea>

            <label>📝 עריכת משימות (משימה בכל שורה):</label>
            <textarea id="taskInput"></textarea>
            
            <div style="margin-top:20px; width: 100%; text-align: center;">
                <img src="btn_enter.png" class="img-btn" onclick="initGame()">
            </div>
        </div>

        <img src="header.png" class="img-header">
        <img src="logo.png" class="img-logo">
        <div id="player-display" class="player-display">מוכנים?</div>
        <div class="gift-area"><img src="gift.png" id="giftImg" class="img-gift" onclick="showTask()"></div>
        <div id="task-overlay" onclick="this.style.display='none'">
            <h2 id="task-text" style="color:#003e29; margin:0; font-size: 24px;"></h2>
            <p style="color:#888; margin-top:20px; font-size: 14px;">(לחץ לסגירה)</p>
        </div>
        <div class="footer-area"><img src="btn_spin.png" id="spinBtn" class="img-btn" onclick="startSpin()"></div>
    </div>

    <script>
        let players = [];
        let customTasks = [];
        let spinning = false;
        
        const defaultTasks = [
            "ספר משהו שאנשים כאן לא יודעים עליך",
            "מה המאכל האהוב עליך בקמפוס?",
            "מה הדבר הכי מעניין שלמדת השבוע?",
            "מי המרצה שהכי השפיע עליך?",
            "ספר על פדיחה שקרתה לך בזום",
            "מה המקום האהוב עליך באוניברסיטה?",
            "מה החלום הבא שאתה רוצה להגשים?",
            "תן טיפ לחיים שעוזר לך ביומיום",
            "מה הדבר הראשון שתעשה בסוף התואר?"
        ];

        // מילוי אוטומטי של המשימות בטעינה
        document.getElementById('taskInput').value = defaultTasks.join('\n');

        function initGame() {
            const nInput = document.getElementById('nameInput').value;
            const tInput = document.getElementById('taskInput').value;
            
            players = nInput.split(/[,\n\t]+/).map(s => s.trim()).filter(s => s !== "");
            customTasks = tInput.split('\n').map(s => s.trim()).filter(s => s !== "");

            if (players.length < 2) return alert("נא להזין לפחות 2 שמות");
            if (customTasks.length === 0) return alert("חייבת להיות לפחות משימה אחת");
            
            document.getElementById('setup-screen').style.display = 'none';
        }

        function startSpin() {
            if (spinning) return;
            spinning = true;
            document.getElementById('task-overlay').style.display = 'none';
            document.getElementById('giftImg').classList.remove('pulse');
            let counter = 0;
            let totalSteps = 12 + Math.floor(Math.random() * 12);
            const timer = setInterval(() => {
                document.getElementById('player-display').innerText = players[counter % players.length];
                counter++;
                if (counter > totalSteps) {
                    clearInterval(timer);
                    spinning = false;
                    document.getElementById('player-display').innerText = "המשימה ל: " + document.getElementById('player-display').innerText;
                    document.getElementById('giftImg').classList.add('pulse');
                }
            }, 100);
        }

        function showTask() {
            if (spinning) return;
            const task = customTasks[Math.floor(Math.random() * customTasks.length)];
            document.getElementById('task-text').innerText = task;
            document.getElementById('task-overlay').style.display = 'block';
        }
    </script>
</body>
</html>
